name: waterlevel-x191

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: waterlevel
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Fetch water level
        run: python waterlevel/fetch_wl.py

      - name: Commit result
        run: |
          git config user.name "waterlevel-bot"
          git config user.email "waterlevel-bot@users.noreply.github.com"
          git add data/waterlevel.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "waterlevel $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
