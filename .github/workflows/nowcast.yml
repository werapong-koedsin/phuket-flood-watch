name: radar-nowcast

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nowcast
  cancel-in-progress: false

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: nowcast/requirements.txt

      - name: Install dependencies
        run: pip install -r nowcast/requirements.txt

      - name: Run nowcast
        run: python nowcast/nowcast.py

      - name: Commit result
        run: |
          git config user.name "nowcast-bot"
          git config user.email "nowcast-bot@users.noreply.github.com"
          git add data/nowcast.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "nowcast $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push
          fi
